<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <link rel="stylesheet" href="form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Forms</title>
</head>
<header>

   <form action=""method="get">
            <img src="logo-culturama.png" alt="logo-culturama">
           <h1>Pesquisa de opinião</h1>

  </header>

<body>
    <main>

    <section>
       
          
            <fieldset>
                 <legend>Dados pessoais</legend>


            <label for="name">Name</label>
            <input id="name" type="text"name="user name" required>
            <br>
            <label for="age">Age</label>
            <input id="age"  type="number"name="age" min="12" max="100" required>
            <br>
            <label for="birthdate">Data de nascimento</label>
            <input id="birthdate" type="date"name="bithdate">
            <br>
            <label for="useremail">Email</label>
            <input id="useremail" type="email"name="useremail"required>
            <br>
            <label for="phonenumber">Telefone</label>
            <input id="phonenumber" type="tel"name="userphonenumber"pattern="[0-9]{11}"placeholder="79 9 99510558">
            <br>
            <label for="image">upload de fotos</label>
            <input id="image" type="file"accept="image/*"name="userimage">
            <br>
            </fieldset>

        
                 <br>
                
                <fieldset>
            <label for="maritalstatus">Estado civil</label>
            <select id="maritalstatus" name="maritalstatus">
                <option value="Notinformed">Selecione...</option>
                <option value="Casado">Casado</option>
                 <option value="Solteiro">Solteiro</option>
                  <option value="Divorciado">Divorciado</option>
                   </select>
                  

                    <label for="states">Cidade (região)</label>
                <select id="states" name="userstate"required>
                <option value="acre"> Acre</option> 
                <option value="amapa"> Amapá</option>  
                <option value="amazonas"> Amazonas</option>  
                <option value="para"> Pará</option> 
                <option value="rondonia"> Rondônia</option>  
                <option value="roraima"> Roraima</option>
                <option value="tocantins"> Tocantins</option> 
                <option value="alagoas<"> Alagoas</option>  
                <option value="bahia"> Bahia</option>  
                <option value="ceara"> Ceará </option>cle
                <option value="maranhao"> Maranhão</option> 
                <option value="paraiba"> Paraíba</option>  
                <option value="pernambuco"> Pernambuco</option>  
                <option value="piaui"> Piauí</option>  
                <option value="rioGrandeDoNorte"> Rio Grande do Norte</option>  
                <option value="sergipe"> Sergipe</option>  
                <option value="goias"> Goiás</option> 
                <option value="matoGrosso"> Mato Grosso</option> 
                <option value="matoGrossoDoSul"> Mato Grosso do Sul</option> 
                <option value="distritoFederal"> Distrito Federal</option>  
                <option value="espiritoSanto"> Espírito Santo</option> 
                <option value="minasGerais"> Minas Gerais</option> 
                <option value="rioDeJaneiro"> Rio de Janeiro</option>  
                <option value="saoPaulo"> São Paulo</option> 
                <option value="parana"> Paraná</option> 
                <option value="rioGrandeDoSul"> Rio Grande do Sul</option>  
                <option value="santaCatarina">Santa Catarina</option>    
              </select>
               <br>
               <label for="city">Cidade</label>
                 <input id="city" type="text" name="usercity"value="Endereço">
           </fieldset>
               <br>
               <fieldset>
                     
                  <legend>Perfil</legend>

                <input id="Feminino" type="radio" name="undergender"value="Feminino">
                <label for="usergender">Feminino</label>
                 <input id="Masculino" type="radio" name="undergender"value="Masculino">
                <label for="usergender">Masculino</label>
                 <input id="notInformed" type="Radio" name="undergender"value="notInformed">
                <label for="Usergender">Prefiro não informar</label>

               </fieldset>
             


            <fieldset>
              
                <legend>Hábitos</legend>

                <input id="Instagram" type="checkbox"name="social" value="instagram" >
                <label for="Instagram">Instagram</label>
                <br>
                <input id="Linkedin" type="checkbox"name="social" value="Linkedin" >
                <label for="Linkedin">Linkedin</label>
                <br>
                <input id="Facebook" type="checkbox"name="social" value="Facebook" >
                <label for="Facebook">Facebook</label>
                <br>
                <input id="x" type="checkbox"name="social" value="x" >
                <label for="x">x</label>

              <br>
              <fieldset>

             
                <label for="musicStyle">Estilo musical:</label>
                <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
                <datalist id="styleTypes">
                    <option value="rock">
                    <option value="samba">
                    <option value="pop">
                    <option value="funk">

              </fieldset>
              
                <br>
                <label for="favoritecolor">cor</label>
                <input type="color" name="userfavoritecolor"id="favoritecolor">     
                </fieldset>

                <fieldset>
                 <legend> Confirmações</legend>
                

                 <input  id="ruim"type="radio"name="userServiceOpinion" value="Ruim">
                 <label for="ruim">ruim</label>
                 <input id="bom" type="radio"name="userServiceOpinion" value="bom">
                 <label for="bom">bom</label>
                 <input id="muito bom" type="radio"name="userServiceOpinion" value="Muito bom">
                 <label for="Muito bom">Muito bom</label>
                 <br>
                 <textarea name="usercomment" id="comment" placeholder="Digite sua opninião aqui"></textarea>
                 
                 <br>

                 <!--
                <fieldset>
                 <legend>Comentário</legend>
                 <label for="comment">comentario</label>
                 <br>
                 <textarea id="comment">...</textarea>

                 </fieldset>-->

                 
                    
                    <input type="checkbox"name="userLgpd"id="userLgpdTerm"value="accepted"required>
                    <label for="userLgpdTerm">Eu aceito participar da pesquisa</label>
                    <input type="checkbox"name="userGetResult"value="accepted">
                    <label for="userLgpdTerm">Desejo receber resultado por email</label>
                     <br>
                    <button type="submit">Enviar</button>
                    <button type="reset">limpar</button>
                
                </fieldset>


        </form>
    </section>
    </main>
</body>
</html>
